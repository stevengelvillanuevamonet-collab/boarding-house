<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — Boarding House Ledger</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="auth-shell">
    <div class="card" style="width:100%; max-width:380px;">
      <div style="text-align:center; margin-bottom:24px;">
        <h1 style="font-size:1.5rem;">Boarding House Ledger</h1>
        <p class="hint-text" style="margin-top:0;">Sign in to manage or view your tenancy</p>
      </div>

      <form id="login-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required autocomplete="current-password" />
        </div>
        <button type="submit" class="btn btn-block">Sign in</button>
        <p id="login-error" class="error-text"></p>
      </form>

      <p class="hint-text" style="text-align:center; margin-top:20px;">
        New tenant accounts are created by the admin. Contact the boarding house owner if you need access.
      </p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
