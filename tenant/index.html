<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Tenancy — Boarding House Ledger</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <div class="app-shell">
    <nav class="sidebar">
      <div class="brand">Boarding House<small>My Tenancy</small></div>
      <div class="sidebar-footer" style="margin-top:0;">
        <div style="font-size:0.82rem; color:#B7C4BE; margin-bottom:10px;" id="tenant-name"></div>
        <button class="nav-item" id="signout-btn">Sign out</button>
      </div>
    </nav>

    <main class="main">
      <div class="main-header">
        <div><h2>Welcome</h2><p class="hint-text">Here's your room and payment history</p></div>
      </div>

      <div id="no-tenancy-msg" style="display:none;" class="empty-state card">
        You don't have an active tenancy on file yet. Please check with the admin.
      </div>

      <div id="announcements-section" style="margin-bottom:24px;"></div>

      <div id="tenancy-content" style="display:none;">
        <div class="stat-grid" id="tenant-stats"></div>
        <div class="card">
          <h3 style="font-size:1rem;">Payment history</h3>
          <div id="tenant-payments-table"></div>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabaseClient.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/receipt.js"></script>
  <script src="../js/tenant.js"></script>
</body>
</html>
